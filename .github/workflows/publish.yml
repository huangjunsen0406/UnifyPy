name: Publish

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target (testpypi/pypi)"
        required: false
        default: testpypi
      version:
        description: "New version to bump (optional, e.g., 2.0.1)"
        required: false
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # allow creating/updating releases when pushing tags
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build
        run: python -m build
      - name: Check dists
        run: twine check dist/*
      - name: Bump version (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
        run: |
          python scripts/release/bump_version.py "${{ inputs.version }}"
          python -m build
          twine check dist/*
      - name: Check tag matches version (tags/releases)
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        run: |
          python scripts/release/check_tag.py "${{ github.event.release.tag_name || github.ref_name }}"
      - name: Create GitHub Release (auto notes)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
      - name: Publish to TestPyPI (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          python -m twine upload --repository testpypi dist/*
      - name: Publish to PyPI (tags/releases)
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload dist/*
